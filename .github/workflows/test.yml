name: Tests

on:
  push:
    branches:
      - main
      - master
      - release/*
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches:
      - main
      - master
      - release/*
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

jobs:
  run_tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0

      - name: Build
        run: |
          cargo build --locked --verbose

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info --quiet
          cargo llvm-cov report

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov.info
          path: lcov.info
          if-no-files-found: ignore
          retention-days: 7

  msrv:
    name: MSRV 1.95
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust 1.95
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          toolchain: 1.95.0
          cache: false

      - name: Check all targets and features
        run: |
          cargo check --all-targets --all-features --locked

  platform-checks:
    name: ${{ matrix.os }} all targets and features
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      - name: Check all targets and features
        run: |
          cargo check --all-targets --all-features --locked
