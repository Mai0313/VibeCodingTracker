name: Build and Release

on:
  push:
    tags:
      - v*

permissions: write-all

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.runner }} - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            friendly_id: macos-arm64
          - runner: macos-14
            target: x86_64-apple-darwin
            friendly_id: macos-x64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            friendly_id: linux-x64-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            friendly_id: linux-arm64-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            friendly_id: windows-x64
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            friendly_id: windows-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          target: ${{ matrix.target }}
          cache: false

      - name: Exclude build dirs from Windows Defender
        if: ${{ startsWith(matrix.runner, 'windows') }}
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "rustc.exe" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "link.exe" -ErrorAction SilentlyContinue

      - name: Cargo build (release)
        run: |
          cargo build --profile dist --locked --target ${{ matrix.target }} --bin vibe_coding_tracker

      - name: Stage Artifact
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          mkdir -p "$dest"
          bin_dir="target/${{ matrix.target }}/dist"
          bin="vibe_coding_tracker"
          if [[ "${{ matrix.runner }}" == windows* ]]; then
            bin="${bin}.exe"
          fi
          # Copy only the binary to avoid uploading sidecar files like *.d
          cp "${bin_dir}/${bin}" "${dest}/${bin}"

      - name: Create .zip (Windows)
        if: ${{ startsWith(matrix.runner, 'windows') }}
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $dest = "dist/${{ matrix.target }}"
          $version = "${env:GITHUB_REF_NAME}".Substring(1)
          $bin = "vibe_coding_tracker.exe"
          $zip = "vibe_coding_tracker-v$version-${{ matrix.friendly_id }}.zip"
          Compress-Archive -Path "$dest\$bin" -DestinationPath "$dest\$zip" -Force

      - name: Create .tar.gz (all platforms)
        if: ${{ !startsWith(matrix.runner, 'windows') }}
        shell: bash
        run: |
          set -euo pipefail
          dest="dist/${{ matrix.target }}"
          version="${GITHUB_REF_NAME#v}"
          bin="vibe_coding_tracker"
          archive="vibe_coding_tracker-v${version}-${{ matrix.friendly_id }}.tar.gz"
          tar -C "$dest" -czf "$dest/${archive}" "${bin}" "${bin}.exe" 2>/dev/null || \
          tar -C "$dest" -czf "$dest/${archive}" "${bin}"
          rm -f "$dest/${bin}" "$dest/${bin}.exe" || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.friendly_id }}
          path: dist/${{ matrix.target }}/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
          overwrite: true

  package:
    name: Package Crate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      - name: Derive version from tag and update Cargo.toml
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "Version from tag: ${VERSION}"
          cargo install cargo-edit --locked
          cargo set-version --workspace "${VERSION}"
          # Stamp the internal path-dep version requirements so the published
          # crates resolve one another on crates.io.
          sed -i -E "s|(vct-core = \{ path = \"src/core\", version = )\"[^\"]*\"|\1\"${VERSION}\"|" Cargo.toml
          sed -i -E "s|(vct-tui = \{ path = \"src/tui\", version = )\"[^\"]*\"|\1\"${VERSION}\"|" Cargo.toml
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build crate packages (.crate)
        continue-on-error: true
        run: |
          cargo package --workspace --allow-dirty

      - name: Publish to crates.io
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Publish in dependency order; cargo waits for each to index.
          cargo publish -p vct-core --allow-dirty
          cargo publish -p vct-tui --allow-dirty
          cargo publish -p vct-cli --allow-dirty

      - name: Upload .crate artifacts
        uses: actions/upload-artifact@v7
        with:
          path: target/package/*.crate
          name: crate
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 6
          overwrite: true

  release:
    name: Create GitHub Release
    needs:
      - build
      - package
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifact contents:"
          ls -alR dist

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/**/*

  # Each platform is published as a prerelease version of @mai0313/vct
  # (<version>-linux-x64 and friends) carrying a single binary and declaring its
  # os/cpu, so npm installs only the matching one. These must reach the registry
  # before the wrappers below, which alias them by exact version.
  publish-npm-platform:
    name: Publish to npm - @mai0313/vct (${{ matrix.npm_platform }})
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      # A registry hiccup on one platform must not cancel the other five; npm
      # refuses to republish a version, so a cancelled leg burns the tag.
      fail-fast: false
      # All six publishes mutate the same packument, and npm answers concurrent
      # writes with 409. Serialize them.
      max-parallel: 1
      matrix:
        include:
          - friendly_id: macos-arm64
            npm_platform: darwin-arm64
          - friendly_id: macos-x64
            npm_platform: darwin-x64
          - friendly_id: linux-arm64-gnu
            npm_platform: linux-arm64
          - friendly_id: linux-x64-gnu
            npm_platform: linux-x64
          - friendly_id: windows-arm64
            npm_platform: win32-arm64
          - friendly_id: windows-x64
            npm_platform: win32-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.friendly_id }}
          path: artifact

      - name: Assemble platform package
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          pkg="cli/nodejs/npm/${{ matrix.npm_platform }}"

          for archive in artifact/*.tar.gz; do
            [ -e "$archive" ] || continue
            tar -xzf "$archive" -C "$pkg"
          done
          for archive in artifact/*.zip; do
            [ -e "$archive" ] || continue
            unzip -q "$archive" -d "$pkg"
          done

          binary=$(jq -r '.files[0]' "$pkg/package.json")
          test -f "$pkg/$binary"
          case "$binary" in
            *.exe) ;;
            *) chmod +x "$pkg/$binary" ;;
          esac

          jq --arg v "${VERSION}-${{ matrix.npm_platform }}" '.version = $v' \
             "$pkg/package.json" > "$pkg/package.json.tmp"
          mv "$pkg/package.json.tmp" "$pkg/package.json"
          cp README.md "$pkg/README.md"

          echo "Package contents:" && ls -lh "$pkg"

      # --tag is mandatory. Without it npm would move `latest` onto a binary-only
      # version that has no bin field, breaking install for everyone. npm 11+
      # refuses an untagged prerelease publish outright; the explicit tag keeps
      # this correct on any npm.
      - name: Publish to npm
        working-directory: cli/nodejs/npm/${{ matrix.npm_platform }}
        run: |
          npm publish --access public --tag ${{ matrix.npm_platform }}

  publish-npm:
    name: Publish to npm - ${{ matrix.scope && format('{0}/', matrix.scope) || '' }}${{ matrix.name }}
    needs: publish-npm-platform
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      # Same reasoning as publish-npm-platform: npm refuses to republish a
      # version, so a leg cancelled because a sibling failed burns the tag.
      fail-fast: false
      matrix:
        include:
          - name: vibe-coding-tracker
            scope: "@mai0313"
          - name: vct
            scope: "@mai0313"
          - name: vibe-coding-tracker
            scope: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: lts/*

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # A prerelease tag must not take `latest`, and npm refuses an untagged
          # prerelease publish outright, so derive the dist-tag from the version.
          NPM_TAG=latest
          case "${VERSION}" in *-*) NPM_TAG="${VERSION#*-}" ;; esac
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "NPM_TAG=${NPM_TAG}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION} under dist-tag ${NPM_TAG}"

      - name: Update package.json name, version and platform deps
        working-directory: cli/nodejs
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE_NAME="${{ matrix.name }}"
          SCOPE="${{ matrix.scope }}"

          if [ -n "${SCOPE}" ]; then
            FULL_NAME="${SCOPE}/${PACKAGE_NAME}"
          else
            FULL_NAME="${PACKAGE_NAME}"
          fi

          # Each alias key already names its platform, so the exact prerelease
          # version it points at is derived from the key itself.
          jq --arg name "${FULL_NAME}" --arg v "${VERSION}" \
             '.name = $name
              | .version = $v
              | .optionalDependencies |= with_entries(
                  .value = "npm:@mai0313/vct@" + $v + "-" + (.key | ltrimstr("@mai0313/vct-"))
                )' \
             package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Copy README for npm
        run: |
          cp README.md cli/nodejs/README.md
          cp README.zh-CN.md cli/nodejs/README.zh-CN.md
          cp README.zh-TW.md cli/nodejs/README.zh-TW.md

      - name: Publish to npm
        working-directory: cli/nodejs
        run: |
          npm publish --access public --tag ${{ steps.version.outputs.NPM_TAG }}

      - name: Verify publication
        working-directory: cli/nodejs
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE_NAME="${{ matrix.name }}"
          SCOPE="${{ matrix.scope }}"

          if [ -n "${SCOPE}" ]; then
            FULL_NAME="${SCOPE}/${PACKAGE_NAME}"
          else
            FULL_NAME="${PACKAGE_NAME}"
          fi

          echo "Waiting for npm registry to update..."
          sleep 10

          # Check if version is available
          PUBLISHED_VERSION=$(npm view ${FULL_NAME}@${VERSION} version 2>/dev/null || echo "")

          if [ "${PUBLISHED_VERSION}" = "${VERSION}" ]; then
            echo "✓ Successfully published ${FULL_NAME}@${VERSION}"
            echo "Install with: npm install -g ${FULL_NAME}"
          else
            echo "Warning: Could not immediately verify publication"
            echo "Please check: https://www.npmjs.com/package/${FULL_NAME}"
          fi

      # A platform version winning `latest` on the host package would hand every
      # `npm install @mai0313/vct` a binary with no launcher, so assert loudly.
      # Only the leg that publishes @mai0313/vct can establish this, and only
      # when the release is not a prerelease (those keep `latest` where it was).
      - name: Verify @mai0313/vct latest is the wrapper
        if: matrix.name == 'vct' && matrix.scope == '@mai0313' && steps.version.outputs.NPM_TAG == 'latest'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          LATEST=""
          for _ in 1 2 3 4 5 6; do
            LATEST=$(npm view @mai0313/vct dist-tags.latest 2>/dev/null || echo "")
            [ "${LATEST}" = "${VERSION}" ] && break
            sleep 10
          done
          echo "@mai0313/vct latest = ${LATEST}"
          if [ "${LATEST}" != "${VERSION}" ]; then
            echo "::error::@mai0313/vct latest is '${LATEST}', expected ${VERSION}."
            echo "::error::Repair with: npm dist-tag add @mai0313/vct@${VERSION} latest"
            exit 1
          fi

  publish-pypi:
    name: Publish to pypi
    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Update pyproject.toml version
        working-directory: cli/python
        run: |
          uv version ${{ steps.version.outputs.VERSION }} --frozen

      - name: Copy README for PyPI
        run: |
          cp README.md cli/python/README.md
          cp README.zh-CN.md cli/python/README.zh-CN.md
          cp README.zh-TW.md cli/python/README.zh-TW.md

      - name: Build per-platform wheels
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Each wheel carries one platform's binary and is tagged accordingly,
          # so pip resolves exactly one of them per host.
          # manylinux@<arch> means "derive the glibc floor from the binary"; the
          # rest are fixed by the target's own deployment floor.
          targets=(
            "macos-arm64 macosx_11_0_arm64"
            "macos-x64 macosx_10_12_x86_64"
            "linux-arm64-gnu manylinux@aarch64"
            "linux-x64-gnu manylinux@x86_64"
            "windows-arm64 win_arm64"
            "windows-x64 win_amd64"
          )

          mkdir -p wheelhouse
          for entry in "${targets[@]}"; do
            read -r friendly_id tag <<< "$entry"
            archive=$(ls artifacts/vibe_coding_tracker-v"${VERSION}"-"${friendly_id}".*)

            rm -rf cli/python/bin
            mkdir -p cli/python/bin
            case "$archive" in
              *.tar.gz) tar -xzf "$archive" -C cli/python/bin ;;
              *.zip)    unzip -q "$archive" -d cli/python/bin ;;
            esac

            # Read the floor off the binary rather than hardcoding one, so the
            # tag stays truthful whenever the build image's glibc moves.
            if [[ "$tag" == manylinux@* ]]; then
              floor=$(objdump -T cli/python/bin/vibe_coding_tracker \
                      | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -uV | tail -1)
              tag="manylinux_${floor#GLIBC_}_${tag#manylinux@}"
              tag="${tag//./_}"
              echo "${friendly_id}: requires ${floor}, tagging ${tag}"
            fi

            # Ship the binary under both CLI names; there is no Python launcher.
            if [ -f cli/python/bin/vibe_coding_tracker.exe ]; then
              cp cli/python/bin/vibe_coding_tracker.exe cli/python/bin/vct.exe
            else
              cp cli/python/bin/vibe_coding_tracker cli/python/bin/vct
              chmod +x cli/python/bin/vct cli/python/bin/vibe_coding_tracker
            fi

            (cd cli/python && uv build --wheel --out-dir ../../wheelhouse)
            uv run --no-project --with 'wheel>=0.45' python -m wheel tags \
              --platform-tag "$tag" --remove wheelhouse/*-py3-none-any.whl
          done

          echo "Built wheels:" && ls -lh wheelhouse

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: |
          # --check-url lets a re-run skip wheels already uploaded; without it
          # uv aborts on the first duplicate and never retries the rest, and
          # PyPI forbids reusing a filename, so the version stays half-published.
          uv publish --check-url https://pypi.org/simple/ wheelhouse/*.whl

      - name: Verify publication
        working-directory: cli/python
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PACKAGE_NAME="vibe_coding_tracker"

          echo "Waiting for PyPI registry to update..."
          sleep 15

          # Check if version is available
          PUBLISHED_VERSION=$(pip index versions ${PACKAGE_NAME} 2>/dev/null | grep "Available versions:" | grep -o "${VERSION}" || echo "")

          if [ "${PUBLISHED_VERSION}" = "${VERSION}" ]; then
            echo "✓ Successfully published ${PACKAGE_NAME}==${VERSION}"
            echo "Install with: pip install ${PACKAGE_NAME}"
          else
            echo "Warning: Could not immediately verify publication"
            echo "Please check: https://pypi.org/project/${PACKAGE_NAME}/"
          fi
