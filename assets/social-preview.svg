<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Vibe Coding Tracker social preview</title>
  <desc id="desc">A social preview banner for Vibe Coding Tracker, a Rust CLI that tracks AI coding assistant usage, token costs, and code operation metrics across Claude Code, Codex, Copilot, and Gemini.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15171a"/>
      <stop offset="0.5" stop-color="#22201b"/>
      <stop offset="1" stop-color="#111315"/>
    </linearGradient>
    <linearGradient id="rust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb45f"/>
      <stop offset="1" stop-color="#e05d44"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37d5c8"/>
      <stop offset="1" stop-color="#ffbf69"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#282c31"/>
      <stop offset="1" stop-color="#191c20"/>
    </linearGradient>
    <filter id="icon-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
      .title { font-size: 76px; font-weight: 850; letter-spacing: 0; fill: #fff7ed; }
      .subtitle { font-size: 31px; font-weight: 650; letter-spacing: 0; fill: #e9dfcf; }
      .body { font-size: 24px; font-weight: 560; letter-spacing: 0; fill: #cfc7bb; }
      .small { font-size: 18px; font-weight: 700; letter-spacing: 0; fill: #f5efe6; }
      .tiny { font-size: 15px; font-weight: 650; letter-spacing: 0; fill: #aeb7c1; }
      .term { font-size: 17px; font-weight: 650; letter-spacing: 0; fill: #d7dde3; }
      .term-dim { font-size: 16px; font-weight: 600; letter-spacing: 0; fill: #89939f; }
      .term-good { font-size: 17px; font-weight: 700; letter-spacing: 0; fill: #78d6a4; }
      .term-warn { font-size: 17px; font-weight: 700; letter-spacing: 0; fill: #ffbf69; }
      .stroke-soft { stroke: rgba(255,255,255,0.12); }
    </style>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <path d="M0,108 C160,58 300,66 454,116 C626,172 766,158 916,96 C1057,38 1190,38 1280,70 L1280,0 L0,0 Z" fill="#ff9f43" opacity="0.08"/>
  <path d="M0,520 C148,564 292,548 430,488 C606,412 794,438 942,518 C1066,586 1182,586 1280,542 L1280,640 L0,640 Z" fill="#37d5c8" opacity="0.07"/>

  <g transform="translate(74 70)" filter="url(#icon-shadow)">
    <rect x="0" y="0" width="112" height="112" rx="28" fill="#171a1e"/>
    <rect x="3" y="3" width="106" height="106" rx="26" fill="none" stroke="url(#rust)" stroke-width="5"/>
    <path d="M33 37 L53 56 L33 75" fill="none" stroke="#fff7ed" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M61 77 L72 48 L83 62 L97 35" fill="none" stroke="url(#signal)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="72" cy="48" r="5.5" fill="#37d5c8"/>
    <circle cx="97" cy="35" r="5.5" fill="#ffbf69"/>
    <rect x="58" y="84" width="36" height="7" rx="3.5" fill="#343a41"/>
  </g>

  <g class="sans" transform="translate(74 246)">
    <text class="title" x="0" y="0">Vibe Coding</text>
    <text class="title" x="0" y="82">Tracker</text>
    <text class="subtitle" x="0" y="140">AI coding usage and cost telemetry</text>
    <text class="body" x="0" y="190">Claude Code, Codex, Copilot, and Gemini.</text>
  </g>

  <g transform="translate(74 516)">
    <rect x="0" y="0" width="152" height="44" rx="22" fill="#2f343a" class="stroke-soft" stroke-width="1"/>
    <circle cx="26" cy="22" r="8" fill="#e05d44"/>
    <text class="sans small" x="44" y="29">Rust CLI</text>

    <rect x="168" y="0" width="182" height="44" rx="22" fill="#263231" class="stroke-soft" stroke-width="1"/>
    <circle cx="194" cy="22" r="8" fill="#37d5c8"/>
    <text class="sans small" x="212" y="29">Token costs</text>

    <rect x="366" y="0" width="184" height="44" rx="22" fill="#2d2f38" class="stroke-soft" stroke-width="1"/>
    <circle cx="392" cy="22" r="8" fill="#9a8cff"/>
    <text class="sans small" x="410" y="29">Code ops</text>
  </g>

  <g transform="translate(636 74)" filter="url(#soft-shadow)">
    <rect x="0" y="0" width="570" height="492" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="0" y="0" width="570" height="58" rx="22" fill="#30353b"/>
    <path d="M0 36 H570 V58 H0 Z" fill="#30353b"/>
    <circle cx="30" cy="29" r="8" fill="#ff6b5f"/>
    <circle cx="56" cy="29" r="8" fill="#ffbf69"/>
    <circle cx="82" cy="29" r="8" fill="#78d6a4"/>
    <text class="mono tiny" x="116" y="36">vct usage --weekly --table</text>

    <g class="mono" transform="translate(34 92)">
      <text class="term-dim" x="0" y="0">model</text>
      <text class="term-dim" x="235" y="0">tokens</text>
      <text class="term-dim" x="360" y="0">cache</text>
      <text class="term-dim" x="462" y="0">cost</text>
      <line x1="0" y1="22" x2="502" y2="22" stroke="#ffffff" stroke-opacity="0.1"/>

      <text class="term" x="0" y="62">claude-sonnet</text>
      <text class="term-good" x="235" y="62">1.82M</text>
      <text class="term" x="360" y="62">61%</text>
      <text class="term-warn" x="462" y="62">$8.42</text>

      <text class="term" x="0" y="112">gpt-5-codex</text>
      <text class="term-good" x="235" y="112">940K</text>
      <text class="term" x="360" y="112">54%</text>
      <text class="term-warn" x="462" y="112">$3.18</text>

      <text class="term" x="0" y="162">gemini-pro</text>
      <text class="term-good" x="235" y="162">512K</text>
      <text class="term" x="360" y="162">47%</text>
      <text class="term-warn" x="462" y="162">$1.06</text>
    </g>

    <g transform="translate(34 302)">
      <text class="sans small" x="0" y="0">File operation insight</text>
      <text class="mono term-dim" x="0" y="34">read</text>
      <rect x="80" y="18" width="358" height="20" rx="10" fill="#2f3a42"/>
      <rect x="80" y="18" width="304" height="20" rx="10" fill="#37d5c8"/>
      <text class="mono term-dim" x="456" y="34">24.7K</text>

      <text class="mono term-dim" x="0" y="76">edit</text>
      <rect x="80" y="60" width="358" height="20" rx="10" fill="#2f3a42"/>
      <rect x="80" y="60" width="198" height="20" rx="10" fill="#ff9f43"/>
      <text class="mono term-dim" x="456" y="76">8.9K</text>

      <text class="mono term-dim" x="0" y="118">write</text>
      <rect x="80" y="102" width="358" height="20" rx="10" fill="#2f3a42"/>
      <rect x="80" y="102" width="142" height="20" rx="10" fill="#9a8cff"/>
      <text class="mono term-dim" x="456" y="118">3.2K</text>
    </g>

    <g transform="translate(34 442)">
      <rect x="0" y="0" width="118" height="28" rx="14" fill="#343840"/>
      <text class="mono tiny" x="16" y="19">analysis</text>
      <rect x="132" y="0" width="92" height="28" rx="14" fill="#343840"/>
      <text class="mono tiny" x="148" y="19">usage</text>
      <rect x="238" y="0" width="102" height="28" rx="14" fill="#343840"/>
      <text class="mono tiny" x="254" y="19">JSONL</text>
      <rect x="354" y="0" width="126" height="28" rx="14" fill="#343840"/>
      <text class="mono tiny" x="370" y="19">LiteLLM</text>
    </g>
  </g>
</svg>
